name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Run unit tests
        run: swift test

      - name: Build release target
        run: swift build -c release --product MacTextActionsApp
