name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      release_name:
        description: "Release name, defaults to the tag when omitted"
        required: false
        type: string
      prerelease:
        description: "Publish as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: macos-13
    env:
      APP_NAME: MacTextActions
      PRODUCT_NAME: MacTextActionsApp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          should_publish="false"
          should_create_tag="false"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.tag }}"
            release_name="${{ inputs.release_name }}"
            prerelease="${{ inputs.prerelease }}"
            should_publish="true"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            release_tag="${{ github.ref_name }}"
            release_name=""
            prerelease="false"
            should_publish="true"
          else
            commit_message="$(git log -1 --pretty=%B)"
            release_tag="$(
              if printf '%s' "${commit_message}" \
                | grep -qE '\[?tag:(v[0-9]+\.[0-9]+\.[0-9]+)\]?'; then
                printf '%s' "${commit_message}" \
                  | grep -oE '\[?tag:(v[0-9]+\.[0-9]+\.[0-9]+)\]?' \
                  | sed -E 's/\[?tag:(v[0-9]+\.[0-9]+\.[0-9]+)\]?/\1/' \
                  | head -n 1
              fi
            )"
            release_name=""
            prerelease="false"

            if [ -n "${release_tag}" ]; then
              should_publish="true"

              if git rev-parse "${release_tag}" >/dev/null 2>&1; then
                should_create_tag="false"
              else
                should_create_tag="true"
              fi
            fi
          fi

          if [ "${should_publish}" = "true" ] && [ -z "${release_name}" ]; then
            release_name="${release_tag}"
          fi

          echo "should_publish=${should_publish}" >> "${GITHUB_OUTPUT}"
          echo "should_create_tag=${should_create_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "bundle_version=${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"

          short_version="${release_tag#v}"
          if [ -z "${short_version}" ] || [ "${short_version}" = "${release_tag}" ]; then
            short_version="0.1.0"
          fi
          echo "short_version=${short_version}" >> "${GITHUB_OUTPUT}"

      - name: Skip when push commit does not request release tag
        if: ${{ steps.metadata.outputs.should_publish != 'true' }}
        run: |
          echo "Latest push commit did not contain tag:vX.Y.Z or [tag:vX.Y.Z]."
          echo "Skipping release workflow."

      - name: Create remote release tag
        if: ${{ steps.metadata.outputs.should_create_tag == 'true' }}
        env:
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Show toolchain versions
        if: ${{ steps.metadata.outputs.should_publish == 'true' }}
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Build release executable
        if: ${{ steps.metadata.outputs.should_publish == 'true' }}
        run: swift build -c release --product "${PRODUCT_NAME}"

      - name: Package unsigned app bundle
        if: ${{ steps.metadata.outputs.should_publish == 'true' }}
        shell: bash
        run: |
          rm -rf dist
          mkdir -p "dist/${APP_NAME}.app/Contents/MacOS"

          cp ".build/release/${PRODUCT_NAME}" "dist/${APP_NAME}.app/Contents/MacOS/${PRODUCT_NAME}"
          chmod +x "dist/${APP_NAME}.app/Contents/MacOS/${PRODUCT_NAME}"

          cat > "dist/${APP_NAME}.app/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>Mac Text Actions</string>
            <key>CFBundleExecutable</key>
            <string>MacTextActionsApp</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.mac-text-actions</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>MacTextActions</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.metadata.outputs.short_version }}</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.metadata.outputs.bundle_version }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          ditto -c -k --sequesterRsrc --keepParent \
            "dist/${APP_NAME}.app" \
            "dist/${APP_NAME}-${{ steps.metadata.outputs.release_tag }}-unsigned.zip"

      - name: Upload workflow artifact
        if: ${{ steps.metadata.outputs.should_publish == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ steps.metadata.outputs.release_tag }}-unsigned
          path: dist/${{ env.APP_NAME }}-${{ steps.metadata.outputs.release_tag }}-unsigned.zip

      - name: Publish GitHub release asset
        if: ${{ steps.metadata.outputs.should_publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.metadata.outputs.release_name }}
          PRERELEASE: ${{ steps.metadata.outputs.prerelease }}
          ASSET_PATH: dist/${{ env.APP_NAME }}-${{ steps.metadata.outputs.release_tag }}-unsigned.zip
        shell: bash
        run: |
          release_notes_file="$(mktemp)"
          cat > "${release_notes_file}" <<'NOTES'
          ## Download

          This release currently publishes an unsigned macOS app bundle archive.

          ## Important

          - The app is intended for personal development or trusted internal use.
          - macOS may block the first launch because the bundle is unsigned and not notarized.
          - If that happens, open it manually from `System Settings > Privacy & Security`.
          NOTES

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${ASSET_PATH}" --clobber
          else
            if [ "${PRERELEASE}" = "true" ]; then
              gh release create "${RELEASE_TAG}" "${ASSET_PATH}" \
                --title "${RELEASE_NAME}" \
                --notes-file "${release_notes_file}" \
                --prerelease
            else
              gh release create "${RELEASE_TAG}" "${ASSET_PATH}" \
                --title "${RELEASE_NAME}" \
                --notes-file "${release_notes_file}"
            fi
          fi
